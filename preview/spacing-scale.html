<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px 24px; }
  .row { gap: 14px; align-items: flex-end; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--ink); height: 14px; }
  .n { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.06em; }
  .v { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); }
</style></head><body>
  <div class="row" style="margin-bottom:14px;"><span class="lbl">Spacing scale · 4px base</span><span class="val" style="margin-left:auto;">--s-1 through --s-10</span></div>
  <div class="row">
    <div class="step"><div class="bar" style="width:4px"></div><span class="n">s-1</span><span class="v">4</span></div>
    <div class="step"><div class="bar" style="width:8px"></div><span class="n">s-2</span><span class="v">8</span></div>
    <div class="step"><div class="bar" style="width:12px"></div><span class="n">s-3</span><span class="v">12</span></div>
    <div class="step"><div class="bar" style="width:16px"></div><span class="n">s-4</span><span class="v">16</span></div>
    <div class="step"><div class="bar" style="width:24px"></div><span class="n">s-5</span><span class="v">24</span></div>
    <div class="step"><div class="bar" style="width:32px"></div><span class="n">s-6</span><span class="v">32</span></div>
    <div class="step"><div class="bar" style="width:48px"></div><span class="n">s-7</span><span class="v">48</span></div>
    <div class="step"><div class="bar" style="width:64px"></div><span class="n">s-8</span><span class="v">64</span></div>
    <div class="step"><div class="bar" style="width:96px"></div><span class="n">s-9</span><span class="v">96</span></div>
    <div class="step"><div class="bar" style="width:128px"></div><span class="n">s-10</span><span class="v">128</span></div>
  </div>
</body></html>
