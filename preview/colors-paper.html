<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px 24px; }
  .row { gap: 12px; }
  .sw { flex: 1; border-radius: 4px; border: 1px solid var(--rule-strong); padding: 14px 14px 12px; min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); }
  .hex { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-2); }
</style></head><body>
  <div class="row" style="margin-bottom:8px;"><span class="lbl">Paper / surface</span><span class="val" style="margin-left:auto;">Sky-blue daytime surface — paper, recessed, horizon, card</span></div>
  <div class="row">
    <div class="sw" style="background:var(--paper)"><span class="name">paper</span><span class="hex">#DCEEF7</span></div>
    <div class="sw" style="background:var(--paper-2)"><span class="name">paper-2</span><span class="hex">#C5E0EF</span></div>
    <div class="sw" style="background:var(--paper-3)"><span class="name">paper-3</span><span class="hex">#A8CFE3</span></div>
    <div class="sw" style="background:var(--card)"><span class="name">card</span><span class="hex">#F0F7FB</span></div>
    <div class="sw" style="background:var(--white)"><span class="name">white</span><span class="hex">#FFFFFF</span></div>
  </div>
</body></html>
