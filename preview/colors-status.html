<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  .card { border: 1px solid var(--rule-strong); border-radius: 4px; padding: 14px; display: flex; flex-direction: column; gap: 8px; min-height: 100px; }
  .pip { width: 8px; height: 8px; border-radius: 50%; }
  .row { gap: 8px; align-items: center; }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-2); }
  .hex { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }
  .badge { font-family: var(--font-mono); font-size: 10.5px; padding: 2px 6px; border-radius: 2px; align-self: flex-start; letter-spacing: 0.06em; }
</style></head><body>
  <div class="grid">
    <div class="card" style="background:var(--ok-wash);"><div class="row"><span class="pip" style="background:var(--ok)"></span><span class="name">ok</span></div><span class="hex">#3A8C5F</span><span class="badge" style="background:var(--ok);color:var(--paper);">[shipped]</span></div>
    <div class="card" style="background:var(--warn-wash);"><div class="row"><span class="pip" style="background:var(--warn)"></span><span class="name">warn</span></div><span class="hex">#E0A93B</span><span class="badge" style="background:var(--warn);color:var(--ink);">[at risk]</span></div>
    <div class="card" style="background:var(--risk-wash);"><div class="row"><span class="pip" style="background:var(--risk)"></span><span class="name">risk</span></div><span class="hex">#D14938</span><span class="badge" style="background:var(--risk);color:var(--paper);">[blocked]</span></div>
    <div class="card" style="background:var(--info-wash);"><div class="row"><span class="pip" style="background:var(--info)"></span><span class="name">info</span></div><span class="hex">#2A4A6E</span><span class="badge" style="background:var(--info);color:var(--paper);">[in review]</span></div>
  </div>
</body></html>
