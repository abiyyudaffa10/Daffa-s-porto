<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 26px 28px; }
  .row { gap: 28px; align-items: center; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 130px; height: 80px; background: var(--card); border-radius: 6px; border: 1px solid var(--rule-strong); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.08em; }
  .s1 { box-shadow: var(--shadow-1); }
  .s2 { box-shadow: var(--shadow-2); }
  .s3 { box-shadow: var(--shadow-3); }
  .n { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase; }
</style></head><body>
  <div class="row" style="margin-bottom:18px;"><span class="lbl">Elevation</span><span class="val" style="margin-left:auto;">Reserved. Hairlines first; shadows only when floating.</span></div>
  <div class="row">
    <div class="tile"><div class="box">FLAT</div><span class="n">none · default</span></div>
    <div class="tile"><div class="box s1">SCROLLED NAV</div><span class="n">shadow-1</span></div>
    <div class="tile"><div class="box s2">POPOVER · MENU</div><span class="n">shadow-2</span></div>
    <div class="tile"><div class="box s3">MODAL</div><span class="n">shadow-3</span></div>
  </div>
</body></html>
