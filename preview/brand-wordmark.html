<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 32px 32px; display: flex; align-items: center; }
  .mark { font-family: var(--font-serif); font-style: italic; font-size: 64px; line-height: 1; letter-spacing: -0.02em; color: var(--ink); }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: var(--signal); margin-left: 2px; vertical-align: baseline; transform: translateY(-2px); }
  .meta { margin-left: auto; text-align: right; }
</style>
</head><body>
  <div class="mark">Daffa Porto<span class="dot"></span></div>
  <div class="meta col gap-1">
    <div class="lbl">Wordmark</div>
    <div class="val">Instrument&nbsp;Serif&nbsp;Italic · 64px</div>
    <div class="val">Period: <span style="color:var(--signal)">#FF6B5A</span></div>
  </div>
</body></html>
