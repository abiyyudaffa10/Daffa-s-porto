<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 28px 32px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; align-items: center; }
  .panel { display: flex; flex-direction: column; gap: 10px; }
  .spark { width: 100%; height: 44px; }
  .pip-row { display: flex; align-items: center; gap: 10px; }
  .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--signal); }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--ink-3); border: 1px solid var(--rule-strong); padding: 3px 7px; border-radius: 2px; background: var(--card); }
  .dot-grid { width: 100%; height: 44px; background-image: radial-gradient(var(--ink-5) 1px, transparent 1.2px); background-size: 12px 12px; opacity: 0.45; }
</style>
</head><body>
  <div class="grid">
    <div class="panel">
      <div class="lbl">Sparkline</div>
      <svg class="spark" viewBox="0 0 240 44" preserveAspectRatio="none"><path d="M0 36 L24 28 L48 32 L72 22 L96 25 L120 14 L144 18 L168 8 L192 11 L216 4 L240 2" fill="none" stroke="#0E2540" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="240" cy="2" r="3.5" fill="#FF6B5A"/></svg>
    </div>
    <div class="panel">
      <div class="lbl">Status pips</div>
      <div class="pip-row"><span class="pip"></span><span class="val">in progress</span></div>
      <div class="pip-row"><span class="pip" style="background:var(--ok)"></span><span class="val">shipped</span></div>
      <div class="pip-row"><span class="pip" style="background:var(--ink-4)"></span><span class="val">archived</span></div>
    </div>
    <div class="panel">
      <div class="lbl">Mono tags</div>
      <div class="row gap-2"><span class="tag">[shipped]</span><span class="tag">[in review]</span></div>
      <div class="lbl" style="margin-top:6px;">Dot pattern</div>
      <div class="dot-grid"></div>
    </div>
  </div>
</body></html>
