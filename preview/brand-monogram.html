<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 32px; }
  .row { gap: 32px; align-items: center; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .mono96 { width: 96px; height: 96px; border-radius: 8px; background: var(--paper); display: flex; align-items: center; justify-content: center; border: 1px solid var(--rule-strong); }
  .mono48 { width: 48px; height: 48px; border-radius: 6px; background: var(--paper); display: flex; align-items: center; justify-content: center; border: 1px solid var(--rule-strong); }
  .mono24 { width: 24px; height: 24px; border-radius: 4px; background: var(--paper); display: flex; align-items: center; justify-content: center; border: 1px solid var(--rule-strong); }
  .fv32 { width: 32px; height: 32px; border-radius: 4px; background: var(--night); display: flex; align-items: center; justify-content: center; }
  .glyph { font-family: var(--font-serif); font-style: italic; line-height: 1; letter-spacing: -0.02em; color: var(--ink); display: flex; align-items: baseline; }
  .glyph .d { color: var(--signal); margin-left: 1px; display: inline-block; border-radius: 50%; }
</style>
</head><body class="row">
  <div class="tile">
    <div class="mono96"><span class="glyph" style="font-size:62px;">dp<span class="d" style="width:7px;height:7px;align-self:flex-end;margin-bottom:8px;"></span></span></div>
    <div class="lbl">Monogram&nbsp;96</div>
  </div>
  <div class="tile">
    <div class="mono48"><span class="glyph" style="font-size:32px;">dp<span class="d" style="width:4px;height:4px;align-self:flex-end;margin-bottom:4px;"></span></span></div>
    <div class="lbl">48</div>
  </div>
  <div class="tile">
    <div class="mono24"><span class="glyph" style="font-size:16px;">dp<span class="d" style="width:2.5px;height:2.5px;align-self:flex-end;margin-bottom:2px;"></span></span></div>
    <div class="lbl">24</div>
  </div>
  <div class="tile">
    <div class="fv32"><span class="glyph" style="font-size:22px;color:var(--paper)"><span style="color:var(--paper)">dp</span><span class="d" style="width:3px;height:3px;align-self:flex-end;margin-bottom:3px;"></span></span></div>
    <div class="lbl">Favicon</div>
  </div>
  <div style="margin-left:auto;" class="col gap-2">
    <div class="lbl">Monogram</div>
    <div class="val">dp&nbsp;·&nbsp;Instrument Serif Italic</div>
    <div class="val">Period always signal&nbsp;orange</div>
    <div class="val">Smallest legible: 16px</div>
  </div>
</body></html>
