<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px 24px; }
  .row { gap: 14px; align-items: center; flex-wrap: wrap; }
  button { font-family: var(--font-sans); font-size: 14px; font-weight: 500; border-radius: 4px; padding: 10px 18px; cursor: pointer; transition: all 120ms var(--ease-out); display: inline-flex; align-items: center; gap: 8px; line-height: 1; }
  .b-primary { background: var(--ink); color: var(--paper); border: 1px solid var(--ink); }
  .b-primary:hover { background: var(--signal-ink); border-color: var(--signal-ink); }
  .b-accent { background: var(--signal); color: var(--paper); border: 1px solid var(--signal); }
  .b-accent:hover { background: var(--signal-ink); border-color: var(--signal-ink); }
  .b-ghost { background: transparent; color: var(--ink); border: 1px solid var(--rule-strong); }
  .b-ghost:hover { background: var(--paper-2); border-color: var(--ink-4); }
  .b-link { background: transparent; color: var(--ink); border: none; padding: 8px 0; text-decoration: underline; text-underline-offset: 4px; text-decoration-color: var(--rule-strong); }
  .b-link:hover { color: var(--signal); text-decoration-color: var(--signal); }
  .b-icon { background: var(--card); border: 1px solid var(--rule-strong); width: 36px; height: 36px; padding: 0; justify-content: center; }
  .b-icon:hover { background: var(--paper-2); }
  .arrow { font-family: var(--font-mono); }
</style></head><body>
  <div class="row" style="margin-bottom:14px;"><span class="lbl">Buttons</span><span class="val" style="margin-left:auto;">Sans 500 · 14 · radius 4</span></div>
  <div class="row">
    <button class="b-primary">Read case study <span class="arrow">→</span></button>
    <button class="b-accent">Email me</button>
    <button class="b-ghost">Download CV</button>
    <button class="b-link">View on GitHub ↗</button>
    <button class="b-icon" aria-label="copy"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
  </div>
</body></html>
