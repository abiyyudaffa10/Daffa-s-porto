<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px 24px; }
  .row { gap: 10px; }
  .sw { flex: 1; border-radius: 4px; padding: 10px 12px; min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; color: var(--paper); }
  .name { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.9; }
  .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; }
</style></head><body>
  <div class="row" style="margin-bottom:8px;"><span class="lbl">Data viz</span><span class="val" style="margin-left:auto;">Sequential palette for charts &amp; categorical badges</span></div>
  <div class="row">
    <div class="sw" style="background:var(--data-1)"><span class="name">data-1 · deep sea</span><span class="hex">#2A4A6E</span></div>
    <div class="sw" style="background:var(--data-2)"><span class="name">data-2 · shallow sea</span><span class="hex">#5A8AB0</span></div>
    <div class="sw" style="background:var(--data-3)"><span class="name">data-3 · sky</span><span class="hex">#86C5DD</span></div>
    <div class="sw" style="background:var(--data-4)"><span class="name">data-4 · sun</span><span class="hex">#FFCF6B</span></div>
    <div class="sw" style="background:var(--data-5)"><span class="name">data-5 · horizon</span><span class="hex">#FF8A6B</span></div>
    <div class="sw" style="background:var(--data-6)"><span class="name">data-6 · signal</span><span class="hex">#FF6B5A</span></div>
  </div>
</body></html>
